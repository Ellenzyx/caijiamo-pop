<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>CAIJIAMO POP - DISH</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b1220" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
    />
    <link rel="stylesheet" href="./style.css" />
    <link rel="manifest" href="./manifest.webmanifest" />
  </head>
  <body>
    <div class="game-root dish-root">
      <header class="game-header">
        <div class="game-title">DISH</div>
        <div aria-hidden="true"></div>
        <button class="ghost-btn" type="button" onclick="history.back()">
          BACK
        </button>
      </header>

      <main class="dish-main">
        <section class="dish-lang-toggle">
          <button
            id="langZhBtn"
            class="primary-btn dish-lang-btn is-active"
            type="button"
          >
            中
          </button>
          <button id="langEnBtn" class="ghost-btn dish-lang-btn" type="button">
            ENG
          </button>
        </section>

        <section class="dish-hero">
          <img id="dishImage" class="dish-image" alt="" />
          <div class="dish-title-block">
            <div id="dishNameZh" class="dish-name-zh"></div>
            <div id="dishNameEn" class="dish-name-en"></div>
          </div>
        </section>

        <section class="dish-recipe-panel">
          <div id="dishRecipe" class="dish-recipe-text"></div>
        </section>
      </main>
    </div>

    <script src="./ui-sound.js"></script>
    <script src="./dish.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./service-worker.js');
        });
      }
    </script>
  </body>
</html>
