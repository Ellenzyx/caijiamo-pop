<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>CAIJIAMO POP - MENU</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b1220" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
    />
    <link rel="stylesheet" href="./style.css" />
    <link rel="manifest" href="./manifest.webmanifest" />
  </head>
  <body>
    <div class="game-root menu-root">
      <header class="game-header">
        <div class="game-title">MENU</div>
        <div aria-hidden="true"></div>
        <button class="ghost-btn" type="button" onclick="location.href='./index.html'">
          BACK
        </button>
      </header>

      <main class="menu-main">
        <section class="menu-lang-toggle">
          <button
            id="menuLangZhBtn"
            class="primary-btn menu-lang-btn is-active"
            type="button"
          >
            中
          </button>
          <button
            id="menuLangEnBtn"
            class="ghost-btn menu-lang-btn"
            type="button"
          >
            ENG
          </button>
        </section>
        <div id="menuGrid" class="menu-grid" aria-label="Cuisine list"></div>
      </main>
    </div>

    <script src="./ui-sound.js"></script>
    <script src="./menu.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./service-worker.js');
        });
      }
    </script>
  </body>
</html>
